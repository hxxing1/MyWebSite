# ============================================================
# 下载中心配置文件
# ============================================================
# 
# 添加新软件步骤：
# 1. 将软件文件放入 static/downloads/ 目录
# 2. 在下方 software 列表中添加新条目
# 3. 保存文件，Hugo 会自动更新网站
#
# 字段说明：
# - name: 软件名称
# - version: 版本号
# - date: 发布日期
# - size: 文件大小
# - platform: 平台类型（Windows/macOS/Linux）
# - file: 下载文件路径（以 /downloads/ 开头）
# - description: 软件功能描述
# ============================================================

software:
  # ----------------------------------------------------------
  # BMS 上位机工具 - Windows 版本
  # ----------------------------------------------------------
  - name: "BMS 上位机工具"
    version: "v1.0.0"
    date: "2024-01-15"
    size: "1.01 MB"
    platform: "Windows"
    file: "/downloads/BMS-Tool-v1.0.0.exe"
    description: "BMS 参数配置与监控工具，支持实时数据监测、参数配置、固件升级等功能"

