{{ define "main" }}
<section class="page-header">
    <div class="container">
        <h1>{{ .Title }}</h1>
        {{ with .Description }}
        <p class="page-description">{{ . }}</p>
        {{ end }}
    </div>
</section>

<section class="list-section">
    <div class="container">
        <div class="list-grid">
            {{ range .Pages }}
            <article class="list-card">
                <h3><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
                <p>{{ .Description }}</p>
                <a href="{{ .Permalink }}" class="btn btn-outline">查看详情</a>
            </article>
            {{ end }}
        </div>
    </div>
</section>
{{ end }}
